name: Release
# Runs ONLY on github.com (guarded). Final build+smoke check of the published
# source, then creates the GitHub Release. The full 3.10-3.13 test matrix lives
# on Gitea; green Gitea CI before tagging is the real quality gate.
on:
  push:
    tags: ['v*.*.*']

# Serialize per tag so a manual re-run cannot race an in-flight release for the
# same tag; never cancel a partially-created release (#234).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    # Bound build + smoke + release so a hung step cannot hold a runner (#264).
    timeout-minutes: 20
    # Least-privilege: only this job needs write (to create the GitHub Release),
    # so scope it here instead of at workflow level -- any job added later stays
    # read-only by default (#229). Mirrors publish-to-github.yaml.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install uv
        run: |
          # Version-pinned installer so uv cannot drift between runs; keep in
          # lockstep with the uv used in local dev and in ci.yaml (#254).
          curl -LsSf https://astral.sh/uv/0.11.29/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build wheel + sdist
        run: uv build
      - name: Assert built version matches the tag
        # A vX.Y.Z tag on a commit whose pyproject version wasn't bumped would
        # otherwise publish a release titled vX.Y.Z carrying a mis-versioned
        # wheel with no failure (#118).
        run: |
          ver="${GITHUB_REF_NAME#v}"
          for f in dist/*; do
            case "$f" in
              *-"$ver"-*|*-"$ver".*) : ;;
              *) echo "::error::$f does not match tag $GITHUB_REF_NAME (version $ver)"; exit 1 ;;
            esac
          done
      - name: Smoke-test the built wheel
        run: |
          python3 -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/mealie-generator --help
          /tmp/smoke/bin/mealie-tool --help
          # mealie-tui --help resolves the entry point and exits without
          # launching the full-screen app, so all three published console
          # scripts are verified here rather than only two (#250).
          /tmp/smoke/bin/mealie-tui --help
      - name: Extract changelog section for this tag
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v tag="$ver" '
            BEGIN { gsub(/\./, "\\.", tag) }   # literal dots, so 1.0.0 != 1x0x0 (#118)
            $0 ~ "^## \\[" tag "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f && /^\[[^][]*\]: / {exit}
            f {print}
          ' CHANGELOG.md > NOTES.md
          test -s NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Idempotent create-or-edit: a re-run for an already-created tag (e.g.
        # after a transient failure in an earlier step) reconciles the release
        # and re-uploads assets instead of dying on "release already exists",
        # mirroring gitea_release.py's 409-is-success contract (#236).
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file NOTES.md
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file NOTES.md dist/*
          fi
